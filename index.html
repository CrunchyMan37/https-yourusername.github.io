<!DOCTYPE html>
<html>
<head>
  <title>My Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .title {
      padding: 10px;
      font-size: 14px;
    }

    a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>🎮 My Game Hub</h1>

<div class="grid">

  <a href="game1.html">
    <div class="card">
      <img src="https://via.placeholder.com/300x120">
      <div class="title">Game 1</div>
    </div>
  </a>

  <a href="game2.html">
    <div class="card">
      <img src="https://via.placeholder.com/300x120">
      <div class="title">Game 2</div>
    </div>
  </a>

  <a href="game3.html">
    <div class="card">
      <img src="https://via.placeholder.com/300x120">
      <div class="title">Game 3</div>
    </div>
  </a>

</div>

</body>
</html>
